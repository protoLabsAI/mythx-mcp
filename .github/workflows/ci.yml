name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version comes from the root package.json "packageManager" field

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Fresh exports may re-resolve deps; fall back to a plain install so a
      # sync commit that touched package.json files doesn't strand CI.
      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint
