name: Release

# Tag `v<version>` (matching packages/mcp-server/package.json) to:
#   1. verify the tag matches the package version (fail-fast, before any setup)
#   2. build + test the workspace
#   3. pack the npm tarball and assemble the Claude Desktop .mcpb bundle
#      (scripts/build-mcpb.mjs) — every artifact is built BEFORE anything
#      is published, so a bundling failure can't leave npm half-released
#   4. publish @mythxengine/mcp-server to npm (provenance, public)
#   5. attach the .mcpb + the npm tarball to a GitHub Release
#
# Fresh-repo setup (one time): configure a TRUSTED PUBLISHER for
# @mythxengine/mcp-server on npmjs.com (package → Settings → Trusted
# Publisher): GitHub Actions, repository protoLabsAI/mythx-mcp, workflow
# filename release.yml, environment blank, allowed actions "npm publish".
# ZERO repo secrets — the publish
# authenticates via the workflow's OIDC id-token, provenance comes with it,
# and the Release is created with the default GITHUB_TOKEN.
#
# Why not an npm token: GitHub deprecated 2FA-bypass granular access tokens
# (changelog 2026-07-08) — they lose sensitive operations Aug 2026 and
# direct publishing entirely ~Jan 2027. Trusted publishing is the
# recommended replacement and needs npm CLI >= 11.5.1 (hence the npm
# upgrade step below; Node 22's bundled npm is 10.x).
#
# After the release, update server.json's mcpb entry: set the release-asset
# URL and paste the fileSha256 printed in the "Build .mcpb bundle" step (also
# saved as the mcpb-sha256 output file attached below), then republish the
# registry listing with mcp-publisher.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm --provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fail fast, before toolchain setup or install.
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(jq -r .version packages/mcp-server/package.json)"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "tag v$TAG_VERSION does not match packages/mcp-server version $PKG_VERSION" >&2
            echo "bump packages/mcp-server/package.json (via a fresh export) or retag" >&2
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        # version comes from the root package.json "packageManager" field

      # NO registry-url here — this is load-bearing. setup-node's
      # registry-url writes an .npmrc _authToken line and exports a literal
      # placeholder NODE_AUTH_TOKEN; npm 12 then authenticates with the
      # garbage placeholder instead of attempting the OIDC
      # trusted-publishing exchange, and the PUT fails with a misleading
      # E404 (observed on the v0.2.0 run). With a clean .npmrc, npm falls
      # through to OIDC. The default registry is npmjs.org anyway. No
      # dependency caching in release builds per the npm docs.
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # trusted publishing needs Node >= 22.14

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 bundles 10.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest && npm --version

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # pnpm pack rewrites workspace:* versions and runs prepack (the tsup
      # publish bundle that inlines all @mythxengine/* workspace deps), so
      # the published artifact is self-contained. Run from the package dir:
      # `pnpm --filter X pack` is not supported on pnpm 9 (pack has no
      # recursive mode).
      - name: Pack npm tarball
        run: |
          mkdir -p release-artifacts
          (cd packages/mcp-server && pnpm pack --pack-destination "$GITHUB_WORKSPACE/release-artifacts")

      - name: Build .mcpb bundle
        run: |
          node scripts/build-mcpb.mjs --out release-artifacts
          sha256sum release-artifacts/*.mcpb | tee release-artifacts/mcpb-sha256.txt

      # Everything is built; publishing starts here. No token: the trusted
      # publisher configured on npmjs.com exchanges this job's OIDC identity
      # for a short-lived publish credential. Provenance is generated
      # automatically with trusted publishing — no --provenance flag needed.
      - name: Publish to npm
        # The ./ prefix is load-bearing: npm 12 parses a bare
        # "release-artifacts/x.tgz" as a github:owner/repo git shorthand and
        # its new --allow-git=none default refuses it (EALLOWGIT). A leading
        # ./ disambiguates to a local file path.
        run: npm publish ./release-artifacts/*.tgz --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.mcpb
            release-artifacts/*.tgz
            release-artifacts/mcpb-sha256.txt
          generate_release_notes: true
